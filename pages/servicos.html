<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - CASEG Protege</title>

    <link rel="stylesheet" href="../assets/css/style.css">

    <script>
        const token = localStorage.getItem("access_token");

        if (!token) {
            alert("Você precisa fazer login.");
            window.location.href = "login.html";
        }
    </script>

</head>
<body>

<header>
    <h1>CASEG Protege</h1>

    <nav>
        <a href="../index.html">Home</a>
        <a href="servicos.html">Serviços</a>
        <a href="avisos.html">Avisos</a>
        <a href="contato.html">Contato</a>
        <a href="login.html">Área do Cliente</a>
    </nav>
</header>

<main>
    <h2>Painel do Cliente</h2>

    <div class="client-info">
        <h3 id="welcomeMessage"></h3>
        <p id="companyName"></p>
        <p>Bem-vindo ao painel do cliente da CASEG Protege.</p>
    </div>

    <div class="client-cards">

        <section class="client-card">
            <h3>Documentos</h3>

            <!-- DOCUMENTOS SERÃO GERADOS PELO JAVASCRIPT -->
            <div id="documentsList"></div>

        </section>


        <section class="client-card">
            <h3>Avisos</h3>

            <div id="noticesList">
                <p>Em breve você verá comunicados e informações importantes aqui.</p>
            </div>

        </section>

    </div>

    <button id="logoutBtn">Sair da conta</button>

</main>

<footer>
    <p>© CASEG Protege</p>
</footer>

<script src="../assets/js/client-panel.js"></script>

</body>
</html>
