<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - CASEG Protege</title>

    <link rel="stylesheet" href="../assets/css/style.css">

    <script>
        const token = localStorage.getItem("access_token");
        const profile = JSON.parse(localStorage.getItem("profile"));

        if (!token || !profile) {
            alert("Você precisa fazer login.");
            window.location.href = "login.html";
        }

        if (profile.role !== "client") {
            alert("Acesso restrito.");
            window.location.href = "login.html";
        }

        if (profile.must_change_password === true) {
            window.location.href = "primeiro-acesso.html";
        }
    </script>
</head>
<body>

<header>
    <h1>CASEG Protege</h1>

    <nav>
        <a href="../index.html">Home</a>
        <a href="servicos.html">Serviços</a>
        <a href="avisos.html">Avisos</a>
        <a href="contato.html">Contato</a>
        <a href="login.html">Área do Cliente</a>
    </nav>
</header>

<main>
    <h2>Painel do Cliente</h2>

    <div class="client-info">
        <h3 id="welcomeMessage"></h3>
        <p id="companyName"></p>
        <p>Bem-vindo ao painel do cliente da CASEG Protege.</p>
    </div>

    <div class="client-cards">
        <section class="client-card">
            <h3>Documentos</h3>

            <div id="documentsList"></div>
        </section>
    </div>

    <button id="logoutBtn">Sair da conta</button>
</main>

<footer>
    <p>© CASEG Protege</p>
    <p>
        <a href="termos-de-uso.html">Termos de Uso</a> —
        <a href="politica-privacidade.html">Política de Privacidade</a>
    </p>
</footer>

<script src="../assets/js/client-panel.js"></script>

</body>
</html>
