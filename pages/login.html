<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - CASEG Protege</title>

    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Font Awesome (ícones profissionais) -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <h1>CASEG Protege</h1>

    <nav>
        <a href="../index.html">Home</a>
        <a href="servicos.html">Serviços</a>
        <a href="avisos.html">Avisos</a>
        <a href="contato.html">Contato</a>
        <a href="login.html">Área do Cliente</a>
    </nav>
</header>

<main>
    <h2>Área do Cliente</h2>
    <p>Acesso exclusivo para clientes.</p>

    <form id="loginForm">

        <!-- CPF / CNPJ -->
        <label for="cpf_cnpj">CPF ou CNPJ</label><br>
        <input type="text" id="cpf_cnpj" name="cpf_cnpj" required><br><br>

        <!-- Senha -->
        <label for="password">Senha</label><br>

        <div style="position: relative; display: inline-block;">
            <input type="password"
                   id="password"
                   name="password"
                   required
                   style="padding-right: 40px;">

            <button type="button"
                    id="togglePassword"
                    style="position: absolute; right: 8px; top: 6px; cursor: pointer; background: none; border: none;">
                <i id="eyeIcon" class="fa-solid fa-eye"></i>
            </button>
        </div>

        <br><br>

        <button type="submit">Entrar</button>

    </form>
</main>

<footer>
    <p>© CASEG Protege</p>
</footer>

<script>

// =============================
// Máscara CPF / CNPJ
// =============================
const cpfInput = document.querySelector("#cpf_cnpj");

cpfInput.addEventListener("input", function () {
    let value = cpfInput.value.replace(/\D/g, "");

    if (value.length <= 11) {
        // CPF
        value = value
            .replace(/(\d{3})(\d)/, "$1.$2")
            .replace(/(\d{3})(\d)/, "$1.$2")
            .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    } else {
        // CNPJ
        value = value
            .replace(/^(\d{2})(\d)/, "$1.$2")
            .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
            .replace(/\.(\d{3})(\d)/, ".$1/$2")
            .replace(/(\d{4})(\d)/, "$1-$2");
    }

    cpfInput.value = value;
});


// =============================
// Mostrar / Ocultar senha
// =============================
const togglePassword = document.querySelector("#togglePassword");
const passwordInput = document.querySelector("#password");
const eyeIcon = document.querySelector("#eyeIcon");

togglePassword.addEventListener("click", function () {

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }

});


// =============================
// Login
// =============================
const form = document.querySelector("#loginForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const cpf_cnpj = cpfInput.value.trim();
    const password = passwordInput.value;

    try {
        const resp = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cpf_cnpj, password }),
        });

        const data = await resp.json();

        if (!resp.ok) {
            alert(data.error || "Erro no login");
            return;
        }

        // Salvar sessão
        localStorage.setItem("access_token", data.session.access_token);
        localStorage.setItem("profile", JSON.stringify(data.profile));

        // Redirecionar conforme tipo de usuário
        if (data.profile.role === "admin") {
            window.location.href = "home.html";
        } else {
            window.location.href = "servicos.html";
        }

    } catch (err) {
        alert("Erro ao conectar com o servidor.");
    }
});

</script>

</body>
</html>
