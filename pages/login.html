<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar - CASEG Protege</title>

    <link rel="stylesheet" href="../assets/css/style.css" />

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <a href="home.html" class="logo-link reveal-on-load delay-1">
                <img
                    src="/site-caseg-protege/logo_transparente.png"
                    alt="Logo CASEG Protege"
                    class="site-logo"
                />
            </a>

            <nav class="main-nav reveal-on-load delay-2">
                <a href="home.html">Home</a>
                <a href="servicos.html">Serviços</a>
                <a href="avisos.html">Sobre</a>
                <a href="contato.html">Contato</a>
                <a href="login.html" class="nav-login">
                    <i class="fa-regular fa-user"></i>
                    Entrar
                </a>
            </nav>
        </div>
    </header>

    <main class="login-page">
        <section class="login-wrapper reveal-on-load delay-3">
            <h2 class="reveal-on-load delay-3">Entrar</h2>

            <p class="login-description reveal-on-load delay-4">
                Acesso exclusivo para clientes e administradores.
            </p>

            <form id="loginForm" class="login-form reveal-on-load delay-4">
                <div class="form-group reveal-on-load delay-4">
                    <label for="cpf_cnpj">CPF ou CNPJ</label>
                    <input type="text" id="cpf_cnpj" name="cpf_cnpj" required />
                </div>

                <div class="form-group reveal-on-load delay-5">
                    <label for="password">Senha</label>

                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                        />

                        <button
                            type="button"
                            id="togglePassword"
                            class="toggle-password-btn"
                            aria-label="Mostrar ou ocultar senha"
                        >
                            <i id="eyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-submit-btn reveal-on-load delay-5">
                    Entrar
                </button>

                <div id="loginMessage"></div>

                <div class="login-footer-links reveal-on-load delay-6">
                    <a href="politica-privacidade.html" target="_blank">
                        Política de Privacidade
                    </a>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>© CASEG Protege</p>
        <p>
            <a href="termos-de-uso.html">Termos de Uso</a> —
            <a href="politica-privacidade.html">Política de Privacidade</a>
        </p>
    </footer>

    <script>
        function onlyDigits(value) {
            return (value || "").replace(/\D/g, "");
        }

        function clearSession() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("profile");
        }

        function setLoginMessage(message, color) {
            loginMessage.innerHTML = `<span style="color:${color};">${message}</span>`;
        }

        function redirectUser(profile) {
            if (!profile || !profile.role) {
                clearSession();
                setLoginMessage("Perfil inválido retornado pelo servidor.", "red");
                return;
            }

            if (profile.role === "admin") {
                window.location.href = "admin.html";
                return;
            }

            if (profile.role === "client" && profile.must_change_password === true) {
                window.location.href = "primeiro-acesso.html";
                return;
            }

            if (profile.role === "client") {
                window.location.href = "cliente.html";
                return;
            }

            clearSession();
            setLoginMessage("Tipo de usuário não reconhecido.", "red");
        }

        const cpfInput = document.querySelector("#cpf_cnpj");

        cpfInput.addEventListener("input", function () {
            let value = onlyDigits(cpfInput.value);

            if (value.length <= 11) {
                value = value
                    .replace(/(\d{3})(\d)/, "$1.$2")
                    .replace(/(\d{3})(\d)/, "$1.$2")
                    .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                value = value
                    .replace(/^(\d{2})(\d)/, "$1.$2")
                    .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
                    .replace(/\.(\d{3})(\d)/, ".$1/$2")
                    .replace(/(\d{4})(\d)/, "$1-$2");
            }

            cpfInput.value = value;
        });

        const passwordInput = document.querySelector("#password");
        const togglePassword = document.querySelector("#togglePassword");
        const eyeIcon = document.querySelector("#eyeIcon");

        togglePassword.addEventListener("click", function () {
            const isPassword = passwordInput.type === "password";

            passwordInput.type = isPassword ? "text" : "password";
            eyeIcon.className = isPassword
                ? "fa-solid fa-eye-slash"
                : "fa-solid fa-eye";
        });

        const loginForm = document.querySelector("#loginForm");
        const loginMessage = document.querySelector("#loginMessage");

        const passwordUpdated = localStorage.getItem("password_updated");

        if (passwordUpdated === "true") {
            setLoginMessage("Senha alterada com sucesso. Faça login novamente.", "green");
            localStorage.removeItem("password_updated");
        }

        loginForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const cpf_cnpj = onlyDigits(document.querySelector("#cpf_cnpj").value.trim());
            const password = document.querySelector("#password").value.trim();

            if (!cpf_cnpj || !password) {
                setLoginMessage("Preencha CPF/CNPJ e senha.", "red");
                return;
            }

            setLoginMessage("Entrando...", "#0b6b79");

            try {
                const response = await fetch("http://localhost:3000/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ cpf_cnpj, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    clearSession();
                    setLoginMessage(data.error || "Erro ao fazer login.", "red");
                    return;
                }

                if (!data.session || !data.session.access_token || !data.profile) {
                    clearSession();
                    setLoginMessage("Resposta inválida do servidor.", "red");
                    return;
                }

                localStorage.setItem("access_token", data.session.access_token);
                localStorage.setItem("profile", JSON.stringify(data.profile));

                setLoginMessage("Login realizado com sucesso!", "green");

                setTimeout(() => {
                    redirectUser(data.profile);
                }, 800);
            } catch (error) {
                console.error("Erro no login:", error);
                clearSession();
                setLoginMessage("Erro ao conectar com o servidor.", "red");
            }
        });
    </script>

    <script src="../assets/js/site-animations.js"></script>

</body>
</html>
